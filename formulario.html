<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Formulario</title>

<!-- Estilos -->
<link rel="stylesheet" href="header.css" />
<link rel="stylesheet" href="formulario.css" />
</head>

<body>

<!-- CONTENEDOR DEL HEADER -->
<div id="header-container"></div>



<h1>Servicio de Autenticación</h1>
<!--Caja blanca-->
<div class="auth-container">
<!-- TITULO DE USUARIO -->
<div id="user-title" class="user-title" style="display: none; color: #333; font-weight: 700; margin-bottom: 10px;"></div>
<!-- ESTADO DEL SERVIDOR ARRIBA DEL FORMULARIO -->
<div id="status" class="status-box"></div>



    <div class="button-group">
        <button class="active-btn" id="btnLogin">Iniciar sesión</button>
        <button class="inactive-btn" id="btnRegister">Registrar Usuario</button>
    </div>

    <input type="text" id="usuario" placeholder="Usuario" />
    <input type="password" id="password" placeholder="Contraseña" />

    <!-- CAMPOS ADMINISTRATIVOS (OCULTOS POR DEFECTO) -->
    <div id="admin-fields" style="display: none;">
        <label for="rol">Rol:</label>
        <select id="rol">
            <option value="cliente">Cliente</option>
            <option value="admin">Administrador</option>
        </select>

        <label for="membresia">Días restantes:</label>
        <select id="membresia">
            <option value="0">0 días</option>
            <option value="30">30 días</option>
            <option value="60">60 días</option>
            <option value="90">90 días</option>
        </select>
    </div>

    <button class="action-btn" id="btnEnviar">Ingresar</button>
    <button class="action-btn" id="btnLogout" style="display: none; background:#555;">Cerrar sesión</button>

    <div id="client-info" style="display:none; margin-top: 16px; text-align:left;">
      <p id="membership-label" style="margin: 0 0 8px 0; font-weight: 600;"></p>
      <p id="tiempo-label" style="margin: 0 0 8px 0;"></p>
      <p id="status-membership-label" style="margin: 0 0 12px 0; font-weight: 700;"></p>
      <button class="action-btn" id="btnPago" style="display: inline-block;">Pago</button>
    </div>

    <!-- NUEVOS BOTONES -->
    <button class="action-btn" id="btnBorrar" style="display: none;">Borrar Cliente</button>
    <button class="action-btn" id="btnLista" style="display: none;">Lista de Clientes</button>
    <button class="action-btn" id="btnActivarMembresia" style="display: none;">Activar membresía</button>

    <div id="activar-membresia-panel" style="display:none; margin-top: 12px; text-align:left;">
      <input type="text" id="activar-usuario" placeholder="Nombre del cliente" style="width: 90%; padding: 10px; border-radius: 14px; border: 1px solid #ccc; margin-bottom: 8px;" />
      <select id="activar-dias" style="width: 94%; padding: 10px; border-radius: 14px; border: 1px solid #ccc; margin-bottom: 8px;">
        <option value="0">0 días</option>
        <option value="30">30 días</option>
        <option value="60">60 días</option>
        <option value="90">90 días</option>
      </select>
      <button class="action-btn" id="btnConfirmarActivar" style="width: 94%;">Confirmar</button>
    </div>

    <p id="mensaje"></p>
    <div id="clientes-listado" style="display:none; margin-top: 14px; text-align:left;"></div>
</div>

<!---se crea una clase footer para controlar estilos desde css-->
<footer class="footer">© 2025 Created by Happy System</footer>

<!-- CARGAR HEADER -->
<script>
fetch("header.html")
  .then(res => res.text())
  .then(html => {
      document.getElementById("header-container").innerHTML = html;
  })
  .catch(err => console.log("Error cargando header:", err));
</script>

<!-- ESTADO DEL BACKEND -->
<script>
async function checkBackend() {
  try {
    const res = await fetch("http://localhost:3000/api/health");
    const box = document.getElementById("status");

    if (res.ok) {
      box.textContent = "Servidor conectado ✅";
      box.style.color = "#28a745";
    } else {
      box.textContent = "Servidor sin conexión";
      box.style.color = "#888";
    }
  } catch (error) {
    const box = document.getElementById("status");
    box.textContent = "Servidor sin conexión";
    box.style.color = "#888";
  }
}

checkBackend();
setInterval(checkBackend, 5000);
</script>

<!-- TU LÓGICA -->
<script type="module" src="formulario.js"></script>

<!-- ESTILOS DEL STATUS -->
<style>

</style>

</body>
</html>
