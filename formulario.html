<!DOCTYPE html>

            <td style="padding: 10px; border: 1px solid #ddd;">7 días</td>
            <td style="padding: 10px; border: 1px solid #ddd;">$40.000</td>
            <td style="padding: 10px; border: 1px solid #ddd;">Activo</td>
          </tr>

            <td style="padding: 10px; border: 1px solid #ddd;">Mes</td>
            <td style="padding: 10px; border: 1px solid #ddd;">30 días</td>
            <td style="padding: 10px; border: 1px solid #ddd;">$100.000</td>
            <td style="padding: 10px; border: 1px solid #ddd;">Activo</td>
          </tr>
          <tr style="background: #f9f9f9;">
            <td style="padding: 10px; border: 1px solid #ddd;">60 días</td>
            <td style="padding: 10px; border: 1px solid #ddd;">60 días</td>
            <td style="padding: 10px; border: 1px solid #ddd;">$180.000</td>
            <td style="padding: 10px; border: 1px solid #ddd;">Activo</td>
          </tr>
          <tr style="background: #fff;">
            <td style="padding: 10px; border: 1px solid #ddd;">90 días</td>
            <td style="padding: 10px; border: 1px solid #ddd;">90 días</td>

    </div>
</div>

<footer class="footer">© 2025 Created by Happy System</footer>

<!-- CARGAR HEADER -->
<script>
function initMembershipPanel() {
  const nav = document.getElementById("nav-membresias");
  const panel = document.getElementById("planes-membresia");
  if (!nav || !panel) return;

  const togglePanel = () => {
    panel.style.display = panel.style.display === "block" ? "none" : "block";
  };

  nav.addEventListener("click", (event) => {
    const isFormularioPage = window.location.pathname.endsWith("formulario.html") || window.location.pathname.endsWith("/formulario");
    if (isFormularioPage) {
      event.preventDefault();
      togglePanel();
    }
  });

  const params = new URLSearchParams(window.location.search);
  if (params.get("showMembresias") === "1") {
    panel.style.display = "block";
    window.history.replaceState({}, "", window.location.pathname);
  }
}

function initPlansPanel() {
  const navPlanes = document.getElementById("nav-planes");
  const panel = document.getElementById("planes-gallery-panel");
  if (!navPlanes || !panel) return;

  navPlanes.addEventListener("click", (event) => {
    event.preventDefault();
    panel.style.display = panel.style.display === "block" ? "none" : "block";
    if (panel.style.display === "block") {
      panel.scrollIntoView({ behavior: "smooth", block: "start" });
    }
  });
}

fetch("header.html")
  .then(res => res.text())
  .then(html => {
      document.getElementById("header-container").innerHTML = html;
      initMembershipPanel();
      initPlansPanel();
  })
  .catch(err => console.log("Error cargando header:", err));
</script>

<!-- ESTADO DEL BACKEND -->
<script>
async function checkBackend() {
  try {
    const res = await fetch("http://localhost:3000/api/health");
    const box = document.getElementById("status");

    if (res.ok) {
      box.textContent = "🏋️Servidor conectado ✅";
      box.style.color = "#28a745";
    } else {
      box.textContent = "Servidor sin conexión";
      box.style.color = "#888";
    }
  } catch (error) {
    const box = document.getElementById("status");
    box.textContent = "Servidor sin conexión";
    box.style.color = "#888";
  }
}

checkBackend();
setInterval(checkBackend, 5000);
</script>
